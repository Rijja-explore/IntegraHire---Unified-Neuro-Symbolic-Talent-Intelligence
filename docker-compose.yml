version: '3.8'

services:
  rct:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: rct-ranking-engine
    ports:
      - "8501:8501"
    environment:
      - STREAMLIT_SERVER_HEADLESS=true
      - STREAMLIT_SERVER_PORT=8501
      - STREAMLIT_SERVER_ADDRESS=0.0.0.0
      - STREAMLIT_LOGGER_LEVEL=info
    volumes:
      - .:/app
      - /app/.streamlit
    networks:
      - rct-network
    restart: unless-stopped

networks:
  rct-network:
    driver: bridge
